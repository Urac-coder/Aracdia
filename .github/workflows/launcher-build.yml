name: launcher-build

on:
  push:
    branches: [main]
    paths:
      - "launcher/**"
      - ".github/workflows/launcher-build.yml"
  pull_request:
    paths:
      - "launcher/**"
      - ".github/workflows/launcher-build.yml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: launcher-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: launcher/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri

      - name: Install Linux deps (Tauri prerequisites)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install npm deps
        run: npm ci

      - name: Type-check + Vite build
        run: npm run build

      - name: Cargo check (Rust backend)
        working-directory: launcher/src-tauri
        run: cargo check --target ${{ matrix.target }}

      # Full bundle build is gated to manual runs / main pushes — too slow for every PR.
      - name: Tauri bundle
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload bundles
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: aracdia-launcher-${{ matrix.target }}
          path: |
            launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 14
