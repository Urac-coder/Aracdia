name = aracdia
title = Aracdia
description = Aracdia voxel RPG — work in progress. Built on the Luanti engine, with custom mods that progressively replace vanilla mechanics (inventory, combat, UI).
author = Aracdia Team

# Allow players to enable extra mods on top of the bundled ones.
allowed_mapgens = v7, v6, flat, valleys, fractal, carpathian
disallowed_mapgens = singlenode

# Players cannot disable our core mod — it owns the node registry.
disabled_settings = enable_damage_default
